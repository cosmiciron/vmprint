<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VMPrint Example: AST JSON to PDF (Web Fonts)</title>
  <link rel="stylesheet" href="./styles.css">
  <script>window.process = { env: {} };</script>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <p class="kicker">VMPrint Examples</p>
      <h1>AST JSON to PDF (Web Fonts)</h1>
      <p class="lede">Static browser pipeline: <code>WebFontManager + Engine + PdfLiteContext</code>.</p>
      <a class="back-link" href="../index.html">All examples</a>
    </header>

    <section class="panel">
      <div class="toolbar">
        <label id="fixture-picker-label" class="fixture-picker" for="fixture-select">
          <select id="fixture-select" aria-label="Built-in fixture"></select>
        </label>
        <button id="upload-button" type="button">Upload JSON</button>
        <button id="generate" type="button" class="primary">Generate PDF</button>
        <input id="upload-json" type="file" accept=".json,application/json">
      </div>

      <label class="field-label" for="ast-input">Document AST JSON</label>
      <textarea id="ast-input" spellcheck="false" aria-label="Document AST JSON"></textarea>
    </section>

    <section class="status-row">
      <p id="status" data-state="idle">Ready.</p>
      <p id="page-count"></p>
      <a id="download-link" aria-disabled="true">Download PDF</a>
    </section>

    <section class="metrics-row" aria-live="polite">
      <p><strong>Boot:</strong> <span id="boot-ms">-</span></p>
      <p><strong>Render:</strong> <span id="render-ms">-</span></p>
    </section>
  </main>

  <script src="./assets/vmprint-fontkit.js"></script>
  <script src="./assets/vmprint-engine.js"></script>
  <script src="./assets/vmprint-web-fonts.js"></script>
  <script src="./assets/vmprint-context-pdf-lite.js"></script>
  <script src="./assets/pipeline.js"></script>
  <script src="./assets/ui.js"></script>
</body>
</html>
